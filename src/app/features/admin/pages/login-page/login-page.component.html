<div class="login-card">
  <h1>Entrar a mis proyectos</h1>
  <p class="hint">Usa el email y la contraseña que te dieron.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Tu email
      <input type="email" formControlName="email" autocomplete="username" placeholder="nombre@ejemplo.com" />
    </label>
    <label>
      Tu contraseña
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
    </label>

    @if (error()) {
      <p class="error">Email o contraseña incorrectos.</p>
    }

    <app-button type="submit" [disabled]="loading() || form.invalid">
      {{ loading() ? 'Entrando…' : 'Entrar' }}
    </app-button>
  </form>
</div>
