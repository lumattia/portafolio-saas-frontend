<div class="carousel-section-editor">
  @if (!hasSubSection) {
    <!-- No slides yet - show add slide button -->
    <div class="no-slides-state">
      <h3>No slides added</h3>
      <p>Click the button below to add your first slide</p>
      <button type="button" class="choose-template-button" (click)="addSubSection()">
        Add First Slide
      </button>
    </div>
  } @else {
    <div class="carousel-editor">
      <div class="slide-selector">
        <div class="slide-tabs">
          @for (slide of subSections; track slide.id; let i = $index) {
            <button
              type="button"
              class="slide-tab"
              [class.active]="i === currentSubSectionIndex"
              (click)="setCurrentSlideIndex(i)"
            >
              Slide {{ i + 1 }}
            </button>
          }
        </div>
        <div class="slide-actions">
          <button type="button" class="action-button" (click)="addSubSection()" title="Add slide">
            +
          </button>
          @if (currentSubSection) {
            <button type="button" class="action-button" (click)="duplicateSubSection()" title="Duplicate slide">
              &#10003;&#10003;
            </button>
            <button type="button" class="action-button danger" (click)="removeSubSection(currentSubSection)" title="Remove slide">
              &#10005;
            </button>
            <button
              type="button"
              class="action-button"
              (click)="moveSlide('up')"
              [disabled]="currentSubSectionIndex === 0"
              title="Move up"
            >
              &#8593;
            </button>
            <button
              type="button"
              class="action-button"
              (click)="moveSlide('down')"
              [disabled]="currentSubSectionIndex === subSections.length - 1"
              title="Move down"
            >
              &#8595;
            </button>
          } 
        </div>
      </div>

      @if (currentSubSection) {
        <div class="slide-editor">
          <ng-container
            *ngComponentOutlet="componentMap[currentSubSection.componentSelector]; inputs: { section: currentSubSection }"
          ></ng-container>
        </div>
      }@else {
             <div class="field-group">
      <label>Image</label>
      <app-number-input
        [value]="content.styles.height"
        (valueChange)="onContentChange('styles.height', $event)"
        [min]="0"
        [max]="1000"
      />
    </div>
          }
    </div>
  }
</div>
