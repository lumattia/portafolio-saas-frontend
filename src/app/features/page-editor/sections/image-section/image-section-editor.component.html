<div class="image-section-editor">
  @if (content && content.inputs) {
    <div class="field-group">
      <label>Image</label>
      <app-image-input
        [value]="content.inputs.image"
        (valueChange)="onContentChange('inputs.image', $event)"
        [config]="{ maxWidth: 1920, maxHeight: 1080, quality: 0.8 }"
      />
    </div>
  }
  <app-button variant="danger" size="sm" (click)="deleteSection()">
    @if (section().isDeleted) { Undo } @else { Delete Section }
  </app-button>
</div>
