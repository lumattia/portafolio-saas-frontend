<div class="flex-layout-container" [ngStyle]="containerStyle">
  @for (subSection of subSections; track subSection.id) {
    <ng-container
      *ngComponentOutlet="componentMap[subSection.componentSelector]; inputs: { content: subSection.contentJson, subSections: subSection.subSections }"
    ></ng-container>
  }
</div>
