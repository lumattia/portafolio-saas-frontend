<div class="background-image-text-section-editor">
  @if (content && content.inputs) {
    <div class="field-group">
      <label>Background Image</label>
      <app-image-input
        [value]="content.inputs.backgroundImage"
        (valueChange)="onContentChange('inputs.backgroundImage', $event)"
        [config]="{ maxWidth: 1920, maxHeight: 1080, quality: 0.8 }"
      />
    </div>
    <div class="field-group">
      <label>Text</label>
      <app-rich-text-input
        [value]="content.inputs.text"
        (valueChange)="onContentChange('inputs.text', $event)"
        placeholder="Enter text..."
      />
    </div>
  }
  <app-button variant="danger" size="sm" (click)="deleteSection()">
    @if (section().isDeleted) { Undo } @else { Delete Section }
  </app-button>
</div>
