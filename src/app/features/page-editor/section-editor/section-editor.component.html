<div class="section-editor">
  <div class="editor-header">
    <h3>Edit Section</h3>
    <button type="button" class="close-button" (click)="close()">&times;</button>
  </div>

  <div class="editor-content">
      <ng-container
        *ngComponentOutlet="editorMap[componentSelector]; inputs: { section: section() }"
      ></ng-container>
    <!-- Delete/Undo button -->
  @if (isDeleted) {
    <app-button [variant]="'success'" (click)="setDeletedState(false)">↩ Deshacer
    </app-button>
  } @else {
    <app-button [variant]="'danger'" (click)="setDeletedState(true)">
      🗑 Eliminar
    </app-button>
  }
  </div>
</div>
