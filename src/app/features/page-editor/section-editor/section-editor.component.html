<div class="section-editor">
  <div class="editor-header">
    <h3>Edit Section</h3>
    <app-button variant="icon" (click)="close()">
      <app-icon name="close" size="md" />
    </app-button>
  </div>

  <div class="editor-content">
      <ng-container
         *ngComponentOutlet="editorMap[componentSelector]; inputs: { section: section, onDelete: onSetDeleteState}"
      ></ng-container>
  </div>
</div>
