<div class="section-editor">
  @if (selectedSection()) {
    <div class="editor-header">
      <h3>Edit Section</h3>
      <button type="button" class="close-button" (click)="close()">&times;</button>
    </div>

    <div class="editor-content">
        <ng-container
          *ngComponentOutlet="editorMap[componentSelector]"
        ></ng-container>
      <!-- Delete/Undo button -->
    @if (isDeleted) {
      <app-button [variant]="'success'" (click)="onSetDeletedState($event, false)">↩ Deshacer
      </app-button>
    } @else {
      <app-button [variant]="'danger'" (click)="onSetDeletedState($event, true)">
        🗑 Eliminar
      </app-button>
    }
    </div>

  
  } @else {
    <div class="no-selection">No section selected</div>
  }
</div>
