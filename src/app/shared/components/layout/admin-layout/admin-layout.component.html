<div class="layout">
  <header class="header">
    <div class="header-left">
      <a routerLink="/" class="brand">Portfolio</a>
    </div>
    <nav class="nav">
      <app-theme-toggle />
      <app-button 
        variant="icon" 
        (click)="toggleViewMode()" 
        title="{{viewModeService.isAdminMode()?'Ver Snapshot':'Editar'}}">
        <app-icon name="eye" size="md" />
      </app-button>
      <app-button 
        variant="primary" 
        (click)="publishSite()" 
        [disabled]="isPublishing()">
        @if (isPublishing()) {
          Publicando...
        } @else {
          Publicar Sitio
        }
      </app-button>
      <div class="user-menu" (mouseenter)="showUserMenu.set(true)" (mouseleave)="showUserMenu.set(false)">
        <span class="user-name">{{ auth.user()?.email }}</span>
        @if (showUserMenu()) {
          <div class="user-dropdown">
            <a (click)="logout()">Salir</a>
          </div>
        }
      </div>
    </nav>
  </header>

  @if (publishMessage()) {
    <div class="publish-message {{ publishMessage()!.type }}">
      {{ publishMessage()!.text }}
    </div>
  }
  
  <div class="main-content">
    <aside class="sidebar desktop-only">
      <div class="sidebar-header">
        <app-button variant="icon" (click)="openSidebarMenuEditor()" title="Editar menú lateral">
          <app-icon name="edit" size="sm" />
        </app-button>
      </div>
      <app-sidebar-menu-renderer [menu]="sidebarMenu()" />
    </aside>
    <main class="content">
      <app-page-editor />
    </main>
  </div>

  <div class="footer-section">
    <div class="footer-header">
      <app-button variant="icon" (click)="openFooterMenuEditor()" title="Editar menú footer">
        <app-icon name="edit" size="sm" />
      </app-button>
    </div>
    <app-footer-menu-renderer [menu]="footerMenu()"/>
  </div>
</div>
