<div class="modal-overlay" (click)="close?.()">
  <div class="modal-content" [class]="'type-' + type">
    <div class="modal-header">
      <h2>{{ title | translate }}</h2>
      <app-button variant="icon" (click)="close?.()">
        <app-icon name="close" size="md" />
      </app-button>
    </div>
    <div class="modal-body">
      <p class="error-message">{{ message | translate:translateParams }}</p>
    </div>
    <div class="modal-footer">
      <app-button (click)="onConfirm()">OK</app-button>
    </div>
  </div>
</div>
